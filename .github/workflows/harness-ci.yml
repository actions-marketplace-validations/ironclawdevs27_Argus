name: Argus Harness CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

env:
  NODE_VERSION: '20.x'

jobs:
  harness:
    name: Test Harness (144 blocks · 738 assertions)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable

      - name: Start Chrome with remote debugging
        run: |
          google-chrome \
            --headless=new \
            --remote-debugging-port=9222 \
            --no-sandbox \
            --disable-setuid-sandbox \
            --disable-dev-shm-usage \
            --disable-gpu \
            --window-size=1920,1080 \
            about:blank &
          echo "Waiting for Chrome to become ready..."
          for i in {1..15}; do
            if curl -sf http://127.0.0.1:9222/json/version > /dev/null 2>&1; then
              echo "Chrome ready (attempt ${i})"
              break
            fi
            if [ "${i}" -eq 15 ]; then
              echo "Chrome failed to start after 15 attempts"
              exit 1
            fi
            sleep 1
          done

      - name: Run test harness
        run: npm run test:harness
        # KNOWN_PERMANENT is empty (since v9.7.2) — all 738 assertions pass; any failure exits 1.
        # If a genuine upstream limit appears, add its block ID to the KNOWN_PERMANENT
        # array in test-harness/validate.js (exit 0 when only those fail).

      - name: Run unit tests (no Chrome required)
        run: npm run test:unit
