name: Argus Harness CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

env:
  NODE_VERSION: '20.x'

jobs:
  harness:
    name: Test Harness (149 blocks · 846 assertions)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable

      - name: Start Chrome with remote debugging
        run: |
          google-chrome \
            --headless=new \
            --remote-debugging-port=9222 \
            --no-sandbox \
            --disable-setuid-sandbox \
            --disable-dev-shm-usage \
            --disable-gpu \
            --window-size=1920,1080 \
            about:blank &
          echo "Waiting for Chrome to become ready..."
          for i in {1..15}; do
            if curl -sf http://127.0.0.1:9222/json/version > /dev/null 2>&1; then
              echo "Chrome ready (attempt ${i})"
              break
            fi
            if [ "${i}" -eq 15 ]; then
              echo "Chrome failed to start after 15 attempts"
              exit 1
            fi
            sleep 1
          done

      - name: Run test harness (with coverage)
        run: npm run coverage:harness
        # Runs the 846-assertion harness under c8 — the harness exit code still gates:
        # KNOWN_PERMANENT is empty (since v9.7.2), so all 846 pass and any failure exits 1
        # (c8 propagates the child exit code). c8 captures in-process src/ coverage to
        # coverage/harness/coverage-final.json. If a genuine upstream limit appears, add
        # its block ID to KNOWN_PERMANENT in test-harness/validate.js.

      - name: Run unit tests (with coverage, no Chrome required)
        run: npm run coverage:unit
        # Vitest v8 coverage → coverage/unit/coverage-final.json (the unit half: Vitest
        # workers do not propagate NODE_V8_COVERAGE to c8, so the two halves are measured
        # separately and merged by scripts/coverage-gate.mjs).

      - name: Coverage gate (merged unit + harness)
        run: npm run coverage:gate
        # Fails CI if merged line coverage < 60% (conservative floor; ratchet up) or a
        # src/ module outside the documented subprocess-tested allowlist is fully
        # uncovered — the "zero-coverage module" guard for the 2026-06-12 audit blind spot.
