name: Publish Package

on:
  release:
    types: [created]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Publish argusqa-os to npm registry
        run: |
          VERSION=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view argusqa-os@$VERSION version 2>/dev/null || echo "")
          if [ -z "$PUBLISHED" ]; then
            npm publish --access public
          else
            echo "argusqa-os@$VERSION already published — skipping."
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-gpr:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@ironclawdevs27'

      - run: npm ci

      - name: Publish @ironclawdevs27/argusqa-os to GitHub Packages
        run: |
          npm pkg set name="@ironclawdevs27/argusqa-os"
          VERSION=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view @ironclawdevs27/argusqa-os@$VERSION version 2>/dev/null || echo "")
          if [ -z "$PUBLISHED" ]; then
            npm publish
          else
            echo "@ironclawdevs27/argusqa-os@$VERSION already published — skipping."
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
