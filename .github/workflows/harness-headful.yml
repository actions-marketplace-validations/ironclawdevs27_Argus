name: Argus Harness (headful soft-assertion lane)

# Weekly headful lane (HARNESS_MAX_PLAN 4.3). Runs the harness under Xvfb with a
# NON-headless Chrome so the ~23 soft() checks (Lighthouse scores, perf-trace
# summaries, heap-growth) actually execute, and promotes them soft→hard via
# ARGUS_HARNESS_STRICT_SOFT=1. This lane is intentionally OUTSIDE the per-PR gate:
# its assertion count is higher than the documented 845 (845 + the promoted soft
# checks), and Lighthouse/heap timing make a couple inherently environment-sensitive,
# so it is scheduled + manual only and never blocks a merge. It moves the soft
# assertions from "never verified" to "verified weekly".

on:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC
  workflow_dispatch: {}    # allow manual runs from the Actions tab

env:
  NODE_VERSION: '20.x'

jobs:
  headful:
    name: Headful harness (soft→hard via Xvfb)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable

      - name: Install Xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Start Xvfb + non-headless Chrome with remote debugging
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2
          # NOTE: deliberately NO --headless flag — Chrome renders to the Xvfb
          # virtual display so Lighthouse / perf-trace / heap soft checks run for real.
          google-chrome \
            --remote-debugging-port=9222 \
            --no-sandbox \
            --disable-setuid-sandbox \
            --disable-dev-shm-usage \
            --window-size=1920,1080 \
            about:blank &
          echo "Waiting for Chrome to become ready..."
          for i in {1..15}; do
            if curl -sf http://127.0.0.1:9222/json/version > /dev/null 2>&1; then
              echo "Chrome ready (attempt ${i})"
              break
            fi
            if [ "${i}" -eq 15 ]; then
              echo "Chrome failed to start after 15 attempts"
              exit 1
            fi
            sleep 1
          done

      - name: Run harness with soft→hard promotion (strict-soft lane)
        env:
          DISPLAY: ':99'
          ARGUS_HARNESS_STRICT_SOFT: '1'
        run: npm run test:harness
        # The 846 hard assertions must still pass; the promoted soft() checks add
        # ~23 more (clean strict run = 869/869). A red run here surfaces a real
        # soft-assertion regression (e.g. Lighthouse no longer returning scores, a
        # Chrome perf-trace API change) that
        # the headless per-PR gate cannot see.
