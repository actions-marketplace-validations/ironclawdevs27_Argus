name: Argus CodeQL Configuration

# Exclude test infrastructure from security scans.
# test-harness/: fixture HTTP server + validate.js harness — runs locally only, not a production attack surface.
# test/unit/: Vitest unit tests — uses os.tmpdir() with timestamped dirs, which is correct test practice.
paths-ignore:
  - test-harness/
  - test/

# Suppress false-positive queries confirmed not applicable to this codebase.
# Rule IDs verified via GitHub API (gh api repos/ironclawdevs27/Argus/code-scanning/alerts).
query-filters:
  - exclude:
      id: js/log-injection
      # Pino JSON-serialises all values; all sources are developer-configured targets.js or exception messages.
  - exclude:
      id: js/request-forgery
      # sitemapUrl is derived from developer-configured baseUrl in targets.js, not from HTTP request input.
      # Same-origin enforcement is applied at lines 91 and 113 of route-discoverer.js.
  - exclude:
      id: js/incomplete-sanitization
      # Pipe and newline escaping in github-reporter.js is for GitHub Markdown table cells — intentional and complete.
  - exclude:
      id: js/shell-command-injection-from-environment
      # dispatcher.js uses execFile with a fixed args array (never string concatenation); abs is path.resolve().
  - exclude:
      id: js/bad-code-sanitization
      # All evaluate() code strings use JSON.stringify-escaped values from developer-configured flow steps in targets.js.
  - exclude:
      id: js/file-access-to-http
      # Intentional: screenshot files are uploaded to Slack pre-signed URLs. File paths generated internally by Argus.
  - exclude:
      id: js/http-to-file-access
      # Intentional: Argus persists crawl findings (report-processor.js) and trend/HAR baselines (baseline-manager.js) to local files by design.
  - exclude:
      id: js/comparison-between-incompatible-types
      # typeof null === 'object', so raw !== null checks after typeof raw === 'object' are always required and correct.
  - exclude:
      id: js/missing-rate-limiting
      # slackRateLimit middleware (Map-based, 30 req/min, Retry-After header) is applied to all Slack routes in server/index.js.
