<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="A11y Deep Fixture — axe-core + color blind simulation testing.">
  <title>A11y Deep Issues Fixture</title>
  <!--
    Harness block [131] — A12 deep accessibility assertions:

    HARD assertions:
      [131a] analyzeA11yDeep returns an array
      [131b] at least 1 a11y_axe_violation found
      [131c] a11y_axe_violation has required fields (axeId, impact, selector, helpUrl)
      [131d] severity maps from axe impact — serious/moderate → 'warning'
      [131e] a11y_deep_summary always present
      [131f] a11y_deep_summary has axeViolations count (number)
      [131g] image-alt violation detected (img#no-alt)
      [131h] a11y_colorblind_risk detected for red-on-gray text
      [131i] a11y_colorblind_risk has contrastRatio field (number)
  -->
  <style>
    body { font-family: sans-serif; padding: 16px; background: #f5f5f5; }

    /*
     * Color blind risk element: red text (#cc0000) on gray background (#888888).
     * Normal contrast ratio: 1.96:1 — already fails WCAG AA.
     * Under protanopia simulation: red looks dark gray → even lower contrast.
     * The analyzer will flag this under both normal and simulated checks.
     */
    .colorblind-risk-text {
      color: #cc0000;
      background-color: #888888;
      padding: 8px 12px;
      display: inline-block;
      font-size: 16px;
    }

    /*
     * Button that looks styled but has no accessible name.
     * axe-core rule: button-name (impact: critical)
     */
    .icon-btn {
      width: 44px;
      height: 44px;
      background: #5e0ed7;
      border: none;
      border-radius: 50%;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>A11y Deep Issues Fixture</h1>

  <!-- axe-core violation: image-alt (serious) — missing alt attribute -->
  <img id="no-alt" src="/static/placeholder.png" width="200" height="100">

  <!-- axe-core violation: button-name (critical) — no accessible text -->
  <button class="icon-btn" id="icon-btn-no-name"></button>

  <!--
    Color blind risk: red text on gray.
    Fails WCAG AA contrast (1.96:1 < 4.5:1) AND fails further under protanopia.
  -->
  <p class="colorblind-risk-text" id="colorblind-text">Important message</p>

  <!--
    axe-core violation: link-name (serious) — empty anchor
  -->
  <a href="/about" id="empty-link"></a>

  <!-- Valid elements — should NOT trigger violations -->
  <button id="valid-btn" aria-label="Close dialog">✕</button>
  <img src="/static/placeholder.png" alt="A decorative placeholder" width="100" height="50">
  <a href="/home" id="valid-link">Go home</a>
</body>
</html>
