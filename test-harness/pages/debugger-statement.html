<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Debugger statement fixture for Argus D6.7 detection">
  <title>Debugger Statement Fixture — Argus D6.7</title>
</head>
<body>
  <h1>Debugger Statement Fixture</h1>
  <p>This page contains <code>debugger;</code> statements accidentally left in shipped code.</p>

  <!-- Inline debugger — function is defined but NOT called at load time.
       Calling it would hit the breakpoint and pause Chrome when DevTools is connected.
       DEBUGGER_SCRIPT scans the textContent and detects debugger; inside the function body. -->
  <script>
    function inspectValue(x) {
      debugger;
      return x * 2;
    }
  </script>

  <!-- External script — processData is defined but NOT called at module level (same reason).
       DEBUGGER_SCRIPT fetches the file and detects debugger; in the source. -->
  <script src="/api/debug-script.js"></script>

  <div id="fixture-ready" data-ready="true">ready</div>
</body>
</html>
