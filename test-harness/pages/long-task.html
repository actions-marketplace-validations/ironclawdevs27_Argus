<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Long task fixture for Argus D6.3 detection">
  <title>Long Task Fixture — Argus D6.3</title>
</head>
<body>
  <h1>Long Task Fixture</h1>
  <p>This page runs a synchronous busy-loop to produce a long task (&gt;50ms) on the main thread.</p>
  <script>
    // Direct measurement — bypasses PerformanceObserver which may not fire in headless Chrome.
    // Initialise the array before Argus injects its listener so INJECT_LONG_TASK_LISTENER
    // sees the existing array and skips the reset (preserving our entry).
    window.__argusLongTasks = [];
    window.addEventListener('load', function() {
      setTimeout(function() {
        var t0 = performance.now();
        var end = t0 + 120;
        while (performance.now() < end) {}
        window.__argusLongTasks.push({
          duration: Math.round(performance.now() - t0),
          startTime: Math.round(t0),
          attribution: null
        });
      }, 300);
    });
  </script>
  <div data-ready="true" id="fixture-ready">ready</div>
</body>
</html>
