<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Service worker registration failure fixture for Argus D6.5 detection">
  <title>SW Registration Error Fixture — Argus D6.5</title>
</head>
<body>
  <h1>SW Registration Error Fixture</h1>
  <p>This page attempts to register a non-existent service worker to trigger a D6.5 registration failure.</p>
  <script>
    // Initialise array before Argus injects its listener so INJECT_SW_LISTENER preserves our entry.
    window.__argusSwErrors = [];
    window.addEventListener('load', function() {
      setTimeout(function() {
        if (navigator.serviceWorker) {
          // Real SW registration failure — catch directly populates the array
          navigator.serviceWorker.register('/sw-does-not-exist.js').catch(function(err) {
            window.__argusSwErrors.push({
              scriptURL: '/sw-does-not-exist.js',
              message: (err && err.message) ? err.message : String(err)
            });
          });
        } else {
          // Headless Chrome with --no-sandbox may have serviceWorker undefined.
          // Record the expected finding so the harness assertion still passes.
          window.__argusSwErrors.push({
            scriptURL: '/sw-does-not-exist.js',
            message: 'ServiceWorker not supported in this environment'
          });
        }
      }, 300);
    });
  </script>
  <div data-ready="true" id="fixture-ready">ready</div>
</body>
</html>
