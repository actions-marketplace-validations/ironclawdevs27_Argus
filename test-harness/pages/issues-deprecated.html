<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deprecated API Issues Fixture</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; }
  </style>
</head>
<body>
  <h1>Deprecated API Issues Fixture</h1>
  <p>
    This page uses deprecated browser APIs that Chrome reports as
    <strong>DeprecationIssue</strong> entries in the DevTools Issues panel
    (DevTools Issues fixture).
  </p>
  <div id="mutation-target">Mutation target element</div>

  <script>
    // Deprecated: unload event listeners. Chrome emits a DeprecationIssue
    // ("Deprecated feature used" / unload handler deprecation) on registration.
    // NOTE: earlier versions of this fixture used Mutation Events (REMOVED in
    // Chrome 127 — registering a listener no longer emits anything) and a
    // same-value document.domain assignment (no-op, no issue). Both stopped
    // producing DeprecationIssues in current Chrome; unload still does.
    window.addEventListener('unload', function () {});

    document.body.dataset.deprecatedReady = 'true';
  </script>
</body>
</html>
