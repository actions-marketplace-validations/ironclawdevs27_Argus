name: 'Argus PR Validator'
description: 'Targeted Argus QA audit on routes affected by a pull request. Blocks merge on critical (or warning) findings.'
author: 'ironclawdevs27'

branding:
  icon: 'shield'
  color: 'purple'

inputs:
  target-url:
    description: 'Base URL of the running application to audit (e.g. https://staging.example.com). The app must be reachable from the GitHub Actions runner. Required.'
    required: true

  github-token:
    description: 'GitHub token for fetching the PR file list. Defaults to the workflow GITHUB_TOKEN. Required for private repositories.'
    required: false
    default: ${{ github.token }}

  block-on:
    description: |
      Severity level that blocks the merge:
        critical — block only when critical findings exist (default)
        warning  — block on any warning or critical finding
        none     — never block (report-only mode)
    required: false
    default: 'critical'

  pr-url:
    description: 'Full GitHub PR URL (e.g. https://github.com/owner/repo/pull/42). Auto-detected from the workflow pull_request event context when not provided.'
    required: false
    default: ''

  routes-file:
    description: |
      Path to an argus.routes.json file (workspace-relative or absolute) containing a JSON array of
      {path, name} route objects, e.g. [{"path":"/","name":"Home"},{"path":"/login","name":"Login"}].
      When omitted, Argus looks for argus.routes.json in the workspace root, then falls back to
      auditing the root path only.
    required: false
    default: ''

  chrome-flags:
    description: 'Extra flags to pass to Chrome at startup, space-separated (e.g. "--disable-web-security --window-size=1920,1080").'
    required: false
    default: ''

  node-version:
    description: 'Node.js version to use.'
    required: false
    default: '20'

outputs:
  blocked:
    description: '"true" if findings at or above the block-on severity were found, "false" otherwise.'
    value: ${{ steps.audit.outputs.blocked }}

  critical-count:
    description: 'Total number of critical-severity findings across all audited routes.'
    value: ${{ steps.audit.outputs.critical_count }}

  warning-count:
    description: 'Total number of warning-severity findings across all audited routes.'
    value: ${{ steps.audit.outputs.warning_count }}

  affected-routes:
    description: 'Comma-separated list of route paths that were audited (e.g. "/,/login,/checkout").'
    value: ${{ steps.audit.outputs.affected_routes }}

runs:
  using: 'composite'
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install argusqa-os
      shell: bash
      run: npm install -g argusqa-os@latest

    - name: Launch Chrome
      shell: bash
      env:
        ARGUS_CHROME_FLAGS: ${{ inputs.chrome-flags }}
      run: |
        # Resolve the Chrome binary — try common names in order.
        CHROME_BIN=$(command -v google-chrome 2>/dev/null \
                  || command -v google-chrome-stable 2>/dev/null \
                  || command -v chromium-browser 2>/dev/null \
                  || command -v chromium 2>/dev/null \
                  || true)

        if [ -z "$CHROME_BIN" ]; then
          echo "::error::No Chrome or Chromium binary found on this runner."
          echo "::error::Install it before this step, e.g.:"
          echo "::error::  sudo apt-get update && sudo apt-get install -y google-chrome-stable"
          exit 1
        fi

        echo "[argus] Using Chrome binary: $CHROME_BIN"

        # shellcheck disable=SC2086
        "$CHROME_BIN" \
          --remote-debugging-port=9222 \
          --headless=new \
          --no-sandbox \
          --disable-gpu \
          --disable-dev-shm-usage \
          --user-data-dir=/tmp/argus-chrome \
          $ARGUS_CHROME_FLAGS &

        echo "[argus] Waiting for Chrome DevTools Protocol to be ready..."
        for i in $(seq 1 20); do
          curl -sf http://localhost:9222/json/version >/dev/null 2>&1 && break
          sleep 0.5
        done

        if ! curl -sf http://localhost:9222/json/version >/dev/null 2>&1; then
          echo "::error::Chrome failed to start on port 9222 after 10 seconds."
          exit 1
        fi

        echo "[argus] Chrome is ready."

    - name: Run PR audit
      id: audit
      shell: bash
      env:
        TARGET_DEV_URL: ${{ inputs.target-url }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
        ARGUS_BLOCK_ON: ${{ inputs.block-on }}
        ARGUS_PR_URL: ${{ inputs.pr-url != '' && inputs.pr-url || format('https://github.com/{0}/pull/{1}', github.repository, github.event.pull_request.number) }}
        ARGUS_ROUTES_FILE: ${{ inputs.routes-file }}
        ARGUS_RETRY_ATTEMPTS: '2'
        MCP_BROWSER_URL: 'http://127.0.0.1:9222'
      run: |
        node "$(npm root -g)/argusqa-os/src/cli/pr-validate.js"
